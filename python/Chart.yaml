apiVersion: v2
description: A Helm chart for HMCTS Python Microservices
name: python
# This is the chart version. This doesn't need to be incremented on every change.
# It is managed by release pipeline based on Github tag
version: 0.1.0 # Do not change
appVersion: 0.1.0 # Do not change
type: application
icon: https://github.com/hmcts/chart-python/raw/master/images/icons8-python-50.png
keywords:
  - python
  - fastapi
  - web
  - postgres
  - postgresql

dependencies:
  - name: library
    version: 2.2.2
    repository: oci://hmctsprod.azurecr.io/helm
  - name: hmcts-postgresql
    version: 0.4.0
    repository: oci://hmctsprod.azurecr.io/helm
    alias: postgresql
    condition: postgresql.enabled
